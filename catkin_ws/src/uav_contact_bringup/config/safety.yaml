safety_monitor:
  rate: 50.0
  max_roll_deg: 12.0
  max_pitch_deg: 12.0
  contact_loss_distance: 0.08
  distance_jump_threshold: 0.03
  sensor_timeout: 0.5
  mavros_timeout: 0.5
  enable_sensor_timeout_check: false
  enable_mavros_timeout_check: false
  require_offboard: true
  require_armed: false
  offboard_drop_emergency: true
  enable_motor_output_warning: true
  motor_output_topic: "/mavros/actuator_control"
  motor_output_warning_threshold: 0.85
  motor_output_indices: []  # Empty means check every normalized output in the message.
  enable_rc_out_normal_velocity_inhibit: true
  rc_out_topic: "/mavros/rc/out"
  rc_out_threshold: 1820
  rc_out_clear_threshold: 1800
  rc_out_channels: []  # Empty means check every RC output channel. Channel indices are 0-based.
